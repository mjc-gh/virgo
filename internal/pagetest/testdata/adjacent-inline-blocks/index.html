<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjacent Inline Blocks Test</title>
</head>
<body>
    <main>
        <!-- Each link in its own paragraph - should have spaces between them -->
        <h2>Social Links</h2>
        <p><a href="https://github.com">Github</a></p>
        <p><a href="https://linkedin.com">LinkedIn</a></p>
        <p><a href="https://twitter.com">Twitter</a></p>

        <!-- Mixed paragraphs with inline content -->
        <h2>Contact Info</h2>
        <p>Email: <a href="mailto:test@example.com">test@example.com</a></p>
        <p>Phone: <strong>555-1234</strong></p>
        <p>Website: <a href="https://example.com">example.com</a></p>
    </main>
</body>
</html>
